name: Run dbt Marketing Pipeline

on:
  schedule:
    # Runs every day at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows you to trigger it manually from GitHub anytime

jobs:
  run_dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-duckdb

      - name: Run dbt Deps
        run: |
          cd marketing_dbt
          dbt deps

      - name: Run and Test dbt Pipeline
        run: |
          cd marketing_dbt

          # Create profiles dir and write the profile file
          mkdir -p $HOME/.dbt
          cat > $HOME/.dbt/profiles.yml <<EOF
          my_dbt_project:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
          EOF

          # Run dbt build using the newly created profile
          dbt build --profiles-dir $HOME/.dbt
